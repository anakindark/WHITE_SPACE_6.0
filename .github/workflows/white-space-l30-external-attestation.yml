name: White Space L30 External Attestation

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/white-space-l30-external-attestation.yml"
      - "white-space-external-evaluator/chunks/payload.part.*.b64"
      - "scripts/make_l29_external_receipt.py"

permissions:
  contents: read
  actions: read
  id-token: write
  attestations: write

concurrency:
  group: white-space-l30-external-attestation
  cancel-in-progress: false

jobs:
  verify-l28-and-emit-l29-receipt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify Python
        run: python3 --version
      - name: Rebuild package from chunks and verify digest
        run: |
          cat white-space-external-evaluator/chunks/payload.part.*.b64 > white-space-external-evaluator/white_space_external_evaluator_package.zip.b64
          base64 -d "white-space-external-evaluator/white_space_external_evaluator_package.zip.b64" > "white-space-external-evaluator/white_space_external_evaluator_package.zip"
          python3 - <<'PY'
          import hashlib
          from pathlib import Path
          expected = "sha256:cac70a11a88315d701c491bf95885dc498a4ee9fa5fcb5b19b8af6c29852ddb3"
          package = Path("white-space-external-evaluator/white_space_external_evaluator_package.zip")
          actual = "sha256:" + hashlib.sha256(package.read_bytes()).hexdigest()
          print("L28_PACKAGE_SHA256=" + actual)
          assert actual == expected, {"actual": actual, "expected": expected}
          PY
      - name: Run portable external verifier
        run: |
          mkdir -p verifier-work verifier-output
          python3 -m zipfile -e "white-space-external-evaluator/white_space_external_evaluator_package.zip" verifier-work
          (cd verifier-work && python3 verify_white_space_external_package.py) | tee verifier-output/verifier_stdout.json
      - name: Create L29 external attestation receipt
        run: |
          python3 "scripts/make_l29_external_receipt.py"
      - name: Upload L29 receipt artifact
        uses: actions/upload-artifact@v4
        with:
          name: white-space-l29-external-attestation-receipt
          path: verifier-output/l29_external_attestation_receipt.json
      - name: Attest L29 receipt
        uses: actions/attest@v4
        with:
          subject-path: verifier-output/l29_external_attestation_receipt.json
      - name: Print marker
        run: echo "WHITE_SPACE_L30_EXTERNAL_ATTESTATION_RECEIPT_READY"
